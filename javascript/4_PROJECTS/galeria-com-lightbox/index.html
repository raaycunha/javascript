<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria com LightBox</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="src/styles/style.css">
    <script src="src/js/script.js" defer></script>
</head>
<body>
    <h1>Galeria</h1>
    <section class="gallery">
        <div class="gallery-item">
            <img
            src="src/assets/image-1.jpg"
            alt="Imagem 1"
            data-src="src/assets/image-1.jpg"
            class="gallery-image"/>
        </div>
        <div class="gallery-item">
            <img
            src="src/assets/image-2.jpg"
            alt="Imagem 2"
            data-src="src/assets/image-2.jpg"
            class="gallery-image"/>
        </div>
        <div class="gallery-item">
            <img
            src="src/assets/image-3.jpg"
            alt="Imagem 3"
            data-src="src/assets/image-3.jpg"
            class="gallery-image"/>
        </div>
        <div class="gallery-item">
            <img
            src="src/assets/image-4.jpg"
            alt="Imagem 4"
            data-src="src/assets/image-4.jpg"
            class="gallery-image"/>
        </div>
    </section>
    <section class="lightbox">
        <div class="lightbox-content">
            <img src="" alt="Imagem em destaque" class="lightbox-image">
        </div>
        <a href="#" class="lightbox-close"><i class="bi bi-x"></i></a>
    </section>
</body>
</html>
