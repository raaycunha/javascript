<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <link rel="stylesheet" href="src/styles/style.css">
    <script src="src/js/script.js" defer></script>
</head>
<body>
    <main class="main-container">
        <h1>Jogo da Velha</h1>
        <section class="box-btn">
            <button id="btnPlayer">2 Jogadores</button>
            <button id="btnInteligency">Contra IA</button>
        </section>
    </main>
    <section class="container-tic-tac">
        <div class="box-one tic-tac"></div>
        <div class="box-two tic-tac"></div>
        <div class="box-three tic-tac"></div>
        <div class="box-four tic-tac"></div>
        <div class="box-five tic-tac"></div>
        <div class="box-six tic-tac"></div>
        <div class="box-seven tic-tac"></div>
        <div class="box-eight tic-tac"></div>
        <div class="box-nine tic-tac"></div>
    </section>
    <section class="container-scoreboard">
        <h1>Placar</h1>
        <div class="scoreboard">
            <p>
                <span style="color: red;">X</span>: 
                <span class="x-check">0</span>
            </p>
            <p>
                <span style="color: green;">O</span>: 
                <span class="o-check">0</span>
            </p>
        </div>
    </section>
</body>
</html>
