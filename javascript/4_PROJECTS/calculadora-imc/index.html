<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="src/styles/style.css">
    <script src="src/js/script.js" defer></script>
</head>
<body>
    <main class="main-container">
        <h1>Calculadora de IMC</h1>
        <section class="container-input">
            <div class="box-input">
                <label for="inHeight">Altura</label>
                <input type="number"
                name="height"
                id="inHeight"
                title="Digite sua altura"
                placeholder="Exemplo: 1,75"
                step="0.01"
                required minlength="1">
            </div>
            <div class="box-input">
                <label for="inWeight">Peso</label>
                <input type="number"
                name="weight"
                id="inWeight"
                title="Digite seu peso"
                placeholder="Exemplo: 70.5"
                step="0.01"
                required minlength="1">
            </div>
        </section>
        <div class="container-button">
            <button id="btnCalculate">Calcular</button>
            <button id="btnClear">Limpar</button>
        </div>
    </main>
    <section class="res-container">
        <h1>Seu IMC: <span id="imcUser">26.1</span></h1>
        <p class="situation">Situação atual: <span id="situationUser">Sobrepeso</span></p>
        <p class="classif">Confira as classificações</p>
        <table class="tabela-imc">
            <thead>
                <tr>
                    <th>IMC</th>
                    <th>Classificação</th>
                    <th>Obesidade</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Menor que 18,5</td>
                    <td>Magreza</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td>Entre 18,5 e 24,9</td>
                    <td>Normal</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td>Entre 25,0 e 29,9</td>
                    <td>Sobrepeso</td>
                    <td>I</td>
                </tr>
                <tr>
                    <td>Entre 30,0 e 39,9</td>
                    <td>Obesidade</td>
                    <td>II</td>
                </tr>
                <tr>
                    <td>Maior que 40,0</td>
                    <td>Obesidade grave</td>
                    <td>III</td>
                </tr>
            </tbody>
        </table>

        <button id="btnBack">Voltar</button>
    </section>
</body>
</html>
